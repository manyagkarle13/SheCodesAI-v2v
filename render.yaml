services:
  - type: web
    name: sakhipause-backend
    env: python
    buildCommand: cd Backend && pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: cd Backend && python manage.py migrate
    startCommand: cd Backend && gunicorn sakhipause_backend.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: sakhipause-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: sakhipause-db
    plan: free
